<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Chat with Bralio on WhatsApp</title>
    <!-- No-JS fallback. The script below redirects instantly when JS is on;
         this fires ~1.5s later only if scripting is disabled. -->
    <meta http-equiv="refresh" content="2; url=https://wa.me/17372713019?text=Hi%20Bralio%21%20I%20want%20to%20learn%20to%20be%20fearless%20in%20corporate%20English.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --teal: #14B8A6; --deep-teal: #0D9488; --teal-dark: #134E4A;
            --orange: #F97316; --slate-dark: #1E293B; --slate-mid: #94A3B8;
            --midnight: #0F172A; --cloud: #F8FAFC; --white: #FFFFFF;
            --slate-200: #E2E8F0; --slate-600: #475569;
            --wa-green: #25D366; --wa-green-dark: #1DA851;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cloud); color: var(--slate-dark); line-height: 1.6;
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            background: var(--midnight); padding: 0 32px; height: 64px;
            display: flex; align-items: center; flex-shrink: 0;
        }
        .logo {
            font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 22px;
            color: var(--white); text-decoration: none; display: flex; align-items: baseline; gap: 4px;
        }
        .logo span { color: var(--orange); font-size: 16px; letter-spacing: 0.08em; }
        main {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px;
        }
        .card {
            max-width: 420px; width: 100%; text-align: center;
            background: var(--white); border: 1px solid var(--slate-200);
            border-radius: 20px; padding: 44px 36px;
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06);
        }
        .spinner {
            width: 44px; height: 44px; margin: 0 auto 24px;
            border: 4px solid var(--slate-200); border-top-color: var(--teal);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800;
            color: var(--midnight); margin-bottom: 12px;
        }
        p { font-size: 15px; color: var(--slate-600); margin-bottom: 28px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--wa-green); color: var(--white); text-decoration: none;
            font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 16px;
            padding: 14px 28px; border-radius: 999px;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .btn:hover { background: var(--wa-green-dark); transform: translateY(-1px); }
        .btn svg { width: 22px; height: 22px; fill: currentColor; }
        footer {
            background: var(--midnight); padding: 20px 32px; text-align: center;
            font-size: 12px; color: var(--slate-mid); flex-shrink: 0;
        }
        footer a { color: var(--teal); text-decoration: none; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">Bralio <span>AI</span></a></nav>
    <main>
        <div class="card">
            <div class="spinner" aria-hidden="true"></div>
            <h1>Opening WhatsApp&hellip;</h1>
            <p>We&rsquo;re connecting you with Bralio. If nothing happens automatically, tap the button below.</p>
            <a id="wa-link" class="btn" href="https://wa.me/17372713019?text=Hi%20Bralio%21%20I%20want%20to%20learn%20to%20be%20fearless%20in%20corporate%20English.">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Open WhatsApp
            </a>
        </div>
    </main>
    <footer><a href="index.html">&larr; Back to bralioapp.com</a></footer>
    <script>
        (function () {
            // Build the link from parts so the number/message stay correct and
            // properly encoded across all WhatsApp clients.
            var phone = "17372713019";
            var text  = "Hi Bralio! I want to learn to be fearless in corporate English.";
            var url   = "https://wa.me/" + phone + "?text=" + encodeURIComponent(text);

            var link = document.getElementById("wa-link");
            if (link) { link.href = url; }

            // replace() so the back button returns the user to where they came
            // from, instead of bouncing them back onto this redirect page.
            window.location.replace(url);
        })();
    </script>
</body>
</html>
